name: iOS Build Enterprise (Pre-signed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Bundle React Native
        run: |
          echo "📦 Bundling React Native..."
          mkdir -p ios/build
          
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios
          
          echo "✅ Bundle created"
          ls -lh ios/main.jsbundle

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Import Enterprise Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "🔐 Importing Enterprise Certificate..."
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          
          rm certificate.p12
          echo "✅ Certificate imported"

      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "📋 Importing Provisioning Profile..."
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          echo "✅ Profile imported"

      - name: Build and Sign
        run: |
          cd ios
          
          echo "🏗️  Building and signing..."
          xcodebuild \
            -workspace TodoApp.xcworkspace \
            -scheme TodoApp \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath ./build \
            -allowProvisioningUpdates \
            clean archive \
            -archivePath ./build/TodoApp.xcarchive

      - name: Create Export Options
        run: |
          cd ios
          cat > ExportOptions.plist << 'ENDOFFILE'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>enterprise</string>
    <key>teamID</key>
    <string>64V732M374</string>
    <key>compileBitcode</key>
    <false/>
    <key>uploadBitcode</key>
    <false/>
    <key>uploadSymbols</key>
    <false/>
</dict>
</plist>
ENDOFFILE

      - name: Export IPA
        run: |
          cd ios
          
          echo "📦 Exporting IPA..."
          xcodebuild -exportArchive \
            -archivePath ./build/TodoApp.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ExportOptions.plist
          
          mv ./build/TodoApp.ipa $GITHUB_WORKSPACE/
          echo "✅ IPA exported"

      - name: Verify IPA
        run: |
          echo "📋 IPA Info:"
          ls -lh TodoApp.ipa
          echo ""
          echo "Size: $(du -h TodoApp.ipa | cut -f1)"
          echo ""
          unzip -l TodoApp.ipa | grep -E "main.jsbundle|TodoApp.app" | head -10

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TodoApp-Enterprise-${{ github.run_number }}
          path: TodoApp.ipa
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - name: Build Summary
        run: |
          echo "=========================================="
          echo "✅ Build Enterprise thành công!"
          echo "=========================================="
          echo ""
          echo "📦 File: TodoApp.ipa"
          echo "🔐 Signed: Enterprise Certificate"
          echo "📱 Device: iPhone XR và mới hơn"
          echo "📦 Bundle: React Native included"
          echo ""
          echo "📥 Cách cài đặt:"
          echo "   1. Tải IPA từ Artifacts"
          echo "   2. Cài trực tiếp (đã sign sẵn)"
          echo "   3. Hoặc distribute qua MDM"
          echo ""
