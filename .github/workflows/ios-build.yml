name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: |
          cd ios
          gem install fastlane

      - name: Build iOS App
        run: |
          cd ios
          fastlane ios build_app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TodoApp-IPA
          path: ios/build/TodoApp.ipa
          retention-days: 30

      - name: Upload dSYM
        uses: actions/upload-artifact@v4
        with:
          name: TodoApp-dSYM
          path: ios/build/TodoApp.app.dSYM.zip
          retention-days: 30
